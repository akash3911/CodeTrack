services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codetrack-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/problems:/app/problems:ro
      - ./auth-f9e85-firebase-adminsdk-fbsvc-b06f1890b0.json:/app/auth-f9e85-firebase-adminsdk-fbsvc-b06f1890b0.json:ro
    networks:
      - codetrack-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codetrack-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - codetrack-network

networks:
  codetrack-network:
    driver: bridge
